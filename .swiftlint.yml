# SwiftLint configuration for ZODSol — Swift 6 compatible.

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - ZODSol.app
  - "**/Package.swift"

analyzer_rules:
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - switch_case_alignment
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

disabled_rules:
  # Swift 6 requires explicit self — SwiftLint's explicit_self conflicts.
  - explicit_self

  # SwiftFormat handles these.
  - trailing_whitespace
  - trailing_newline
  - trailing_comma
  - vertical_whitespace
  - indentation_width

  # Not enforced for this codebase.
  - identifier_name
  - file_header
  - missing_docs
  - no_magic_numbers
  - todo

force_cast: warning
force_try: warning

type_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

reporter: "xcode"
